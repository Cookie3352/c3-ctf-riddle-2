<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Warning</title>
    <style>
        /* Dark, cautionary aesthetic */
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Garamond', serif; /* Elegant but serious font */
        }

        .riddle-box {
            position: relative;
            padding: 40px;
            border: 1px solid #2a2a2a;
            background: radial-gradient(circle at center, #151515 0%, #0d0d0d 100%);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            max-width: 500px;
        }

        /* Red warning accent line */
        .riddle-box::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: #8b0000; /* Deep warning red */
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.5);
        }

        p {
            font-size: 1.4rem;
            line-height: 1.8;
            margin: 10px 0;
            letter-spacing: 1px;
            font-style: italic;
            transition: color 0.3s ease;
        }

        /* Indentation to match your specific layout */
        .indent {
            padding-left: 60px;
        }

        /* Interactive hint on hover */
        p:hover {
            color: #ff4d4d;
            cursor: default;
        }

        /* Small decorative element at the bottom */
        .symbol {
            margin-top: 20px;
            text-align: center;
            color: #444;
            font-size: 0.8rem;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <div class="riddle-box">
        <p>Hands are warned to stay away,</p>
        <p class="indent">Though lips return every day.</p>
        <p>Clean, yet not for cleaning</p>
        <p>Find where the warning has meaning.</p>
        <div class="symbol">◆ ◆ ◆</div>
    </div>

</body>
</html>
